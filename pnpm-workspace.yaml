# @format

packages:
    - 'apps/*'
    - 'packages/*'

allowBuilds:
    '@parcel/watcher': true
    esbuild: true
    msw: true
    sharp: true
    unrs-resolver: true

minimumReleaseAgeExclude:
    - vite@8.0.16
    - '@vitest/coverage-v8@4.1.8'
    - '@vitest/expect@4.1.8'
    - '@vitest/mocker@4.1.8'
    - '@vitest/pretty-format@4.1.8'
    - '@vitest/runner@4.1.8'
    - '@vitest/snapshot@4.1.8'
    - '@vitest/spy@4.1.8'
    - '@vitest/utils@4.1.8'
    - vitest@4.1.8
