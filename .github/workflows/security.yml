# @format
name: Security

on:
    schedule:
        - cron: '0 3 * * *'
    workflow_dispatch:

permissions:
    contents: read
    issues: write

jobs:
    scan:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6.0.9
              with:
                  version: 11.5.0

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: pnpm audit:ci || true # allow the job to continue so we can collect findings
            - uses: trufflesecurity/trufflehog@main
              if: always()
              with:
                  path: ./

            # Collect findings into a dedicated report (example)
            - name: Generate security findings summary
              run: |
                  # produce a simple findings file if any checks failed; adapt to your tooling
                  echo "# Security scan findings" > security-report.md
                  # append pnpm audit output, trufflehog results, etc. (placeholder)
                  if [ -f pnpm-audit-output.txt ]; then
                    cat pnpm-audit-output.txt >> security-report.md
                  fi
                  # If no findings, ensure file indicates no findings
                  if [ ! -s security-report.md ]; then
                    echo "No findings" > security-report.md
                  fi

            - name: Create issue from findings (only if meaningful)
              if: ${{ steps.generate_security_report.outputs.has_findings == 'true' || always() && (github.event_name == 'workflow_dispatch') }}
              uses: peter-evans/create-issue-from-file@v5
              with:
                  title: Security scan findings
                  content-filepath: security-report.md
