# @format
name: Security

on:
    schedule:
        - cron: '0 3 * * *'
    workflow_dispatch:

permissions:
    contents: read
    issues: write

jobs:
    scan:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: pnpm/action-setup@v6.0.9
              with:
                  version: 11.5.0

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run pnpm audit (JSON)
              id: pnpm_audit
              run: |
                  # produce JSON audit output for later analysis; don't fail the job here
                  pnpm audit --json > pnpm-audit.json || true

            - name: Run trufflehog (always)
              if: always()
              uses: trufflesecurity/trufflehog@main
              with:
                  path: ./

            - name: Analyze audit output and generate report
              id: analyze
              run: |
                  node - <<'NODE'
                  const fs = require('fs');
                  const out = process.env.GITHUB_OUTPUT;
                  let has = false;
                  if (fs.existsSync('pnpm-audit.json')) {
                    try {
                      const j = JSON.parse(fs.readFileSync('pnpm-audit.json', 'utf8'));
                      const vuln = (j.metadata && j.metadata.vulnerabilities)
                        ? Object.values(j.metadata.vulnerabilities).reduce((a,b)=>a+b,0)
                        : 0;
                      const report = ['# Security scan findings', '', `Vulnerabilities: ${vuln}`, ''];
                      if (vuln > 0) {
                        report.push('```json', JSON.stringify(j, null, 2), '```');
                        has = true;
                      } else {
                        report.push('No findings');
                      }
                      fs.writeFileSync('security-report.md', report.join('\n'));
                    } catch (e) {
                      fs.writeFileSync('security-report.md', '# Security scan findings\n\nFailed to parse audit output\n');
                    }
                  } else {
                    fs.writeFileSync('security-report.md', '# Security scan findings\n\nNo audit output found\n');
                  }
                  fs.appendFileSync(out, `has_findings=${has}\n`);
                  NODE

            - name: Create issue from findings (only if there are findings)
              if: ${{ steps.analyze.outputs.has_findings == 'true' }}
              uses: peter-evans/create-issue-from-file@v6.0.0
              with:
                  title: Security scan findings
                  content-filepath: security-report.md
