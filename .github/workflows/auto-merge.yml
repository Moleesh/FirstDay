# @format
name: Auto Merge PRs

on:
    workflow_run:
        workflows: [CI]
        types: [completed]

permissions:
    contents: write
    pull-requests: write

jobs:
    squash_merge:
        if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}
        runs-on: ubuntu-latest
        steps:
            - name: Squash merge the pull request
              uses: actions/github-script@v8
              with:
                  script: |
                      const pullRequest = context.payload.workflow_run.pull_requests?.[0];

                      if (!pullRequest) {
                        core.info('No pull request was associated with this CI run.');
                        return;
                      }

                      const { data: pr } = await github.rest.pulls.get({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: pullRequest.number,
                      });

                      if (pr.state !== 'open') {
                        core.info(`Pull request #${pr.number} is not open anymore.`);
                        return;
                      }

                      if (pr.draft) {
                        core.info(`Pull request #${pr.number} is still a draft.`);
                        return;
                      }

                      if (pr.base.ref !== 'main') {
                        core.info(`Pull request #${pr.number} does not target main.`);
                        return;
                      }

                      // Respect branch protection & mergeability — attempt merge and log result
                      try {
                        await github.rest.pulls.merge({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: pr.number,
                          merge_method: 'squash',
                        });
                        core.info(`Merged PR #${pr.number}`);
                      } catch (err) {
                        core.warning(`Failed to merge PR #${pr.number}: ${err}`);
                      }
