# @format
name: CI

on:
    push:
    pull_request:
    workflow_dispatch:

jobs:
    verify:
        environment: FirstDay
        runs-on: ubuntu-latest
        env:
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6.0.9
              with:
                  version: 11.5.0
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm validate:env
            - run: pnpm lint
            - run: pnpm format
            - run: pnpm typecheck
            - run: pnpm test
            - run: pnpm audit:ci
            - uses: trufflesecurity/trufflehog@main
              with:
                  path: ./
            - run: pnpm build
            - run: pnpm --filter @onboarding/web exec playwright install --with-deps chromium
            - run: pnpm --filter @onboarding/web e2e
